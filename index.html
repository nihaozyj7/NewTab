<!DOCTYPE html>
<html lang="zh-CN">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新标签页</title>

    <style>
      body,
      html {
        display: block;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        height: 100%;
        width: 100%;
        font-size: 16px;
        user-select: none;
        overflow: hidden;
      }

      * {
        box-sizing: border-box;
      }

      h3,
      button {
        padding: 0;
        margin: 0;
      }

      * {
        font-size: 1rem;
      }

      body {
        background-color: #e6e6e6;
        color: #252526;
      }

      body.dark {
        background-color: #252526;
        color: #dadada;
      }

      body.dark main button {
        color: aquamarine;
      }

      body.dark main input {
        color: rgb(172, 172, 172);
      }

      main {
        margin: 0 auto;
        width: 800px;
        position: relative;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid #575757;
        padding: .2rem;
        box-sizing: border-box;
        height: 40px;
      }

      .search-engine-list {
        position: absolute;
        flex-direction: column;
        align-items: center;
        background-color: #e0e0e0;
        border: 1px solid #a7a7a7;
        border-radius: .25rem;
        top: 3.5rem;
        left: 0;
        z-index: 9;
        display: none;
        width: 7rem;
        overflow: hidden;
      }

      body.dark .search-engine-list {
        background-color: #3b3b3b;
        border: 1px solid #555;
      }

      .search-engine-list .item {
        cursor: pointer;
        padding: .3rem 0;
        display: block;
        position: relative;
        color: #333;
        border-bottom: 1px solid #e0e0e0;
        width: 100%;
        text-align: center;
      }

      body.dark .search-engine-list .item {
        color: #e0e0e0;
        border-bottom: 1px solid #444;
      }

      .search-engine-list .item:last-child {
        border-bottom: none;
      }

      .search-engine-list .item.active {
        background-color: #0078D4;
        color: white;
      }

      body.dark .search-engine-list .item.active {
        background-color: #005a9e;
      }

      .search-engine-list .item.active::before {
        position: absolute;
        content: "*";
        left: .5rem;
        top: .5rem;
      }

      .search-engine-list .item:hover {
        background-color: #e6f0fa;
      }

      body.dark .search-engine-list .item:hover {
        background-color: #4a4a4a;
      }

      .search-engine {
        background-color: #2d633d;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 80px;
        flex-shrink: 0;
      }

      .search-box {
        width: 100%;
        padding: 0 1rem;
        font-size: 1.5rem;
        margin: 0;
        border: none;
        outline: none;
        background: transparent;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        height: 100%;
        box-sizing: border-box;
      }

      main input,
      main button,
      .search-engine-name {
        background-color: transparent;
        border: none;
        outline: none;
        cursor: pointer;
        height: 100%;
      }

      main input:focus {
        outline: none;
      }

      main button:hover {
        background-color: #005a9e;
        transform: scale(1.05);
      }

      main button:active {
        transform: scale(0.95);
      }

      .search-engine-name {
        padding: 0 1rem;
        background-color: #2d633d;
        color: white;
        font-size: 1rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 80px;
        height: 100%;
        box-sizing: border-box;
        margin: 0;
        border: none;
      }

      .search-button {
        padding: 0 1rem;
        background-color: #0078D4;
        border: none;
        cursor: pointer;
        color: white;
        font-size: 1rem;
        min-width: 80px;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .button {
        margin-right: -1px;
        flex-shrink: 0;
        min-width: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
      }

      /* ========== 设置面板样式 ========== */
      .settings-panel {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1000;
      }

      .settings-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
      }

      .settings-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: #fff;
        border-radius: 12px;
        width: 600px;
        max-height: 80vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        animation: settingsFadeIn 0.3s ease-out;
      }

      @keyframes settingsFadeIn {
        from {
          opacity: 0;
          transform: translate(-50%, -55%);
        }

        to {
          opacity: 1;
          transform: translate(-50%, -50%);
        }
      }

      body.dark .settings-content {
        background-color: #2d2d2d;
        color: #dadada;
      }

      .settings-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 20px;
        border-bottom: 1px solid #eee;
        background-color: #f8f9fa;
        border-radius: 12px 12px 0 0;
        flex-shrink: 0;
      }

      body.dark .settings-header {
        background-color: #3a3a3a;
        border-bottom-color: #444;
      }

      .settings-header h2 {
        margin: 0;
        font-size: 1.5rem;
      }

      .close-btn {
        font-size: 2rem;
        cursor: pointer;
        padding: 0 10px;
        color: #666;
        transition: color 0.2s;
      }

      .close-btn:hover {
        color: #333;
      }

      body.dark .close-btn {
        color: #aaa;
      }

      body.dark .close-btn:hover {
        color: #fff;
      }

      /* Tab 导航样式 */
      .settings-tabs {
        display: flex;
        border-bottom: 2px solid #e9ecef;
        background-color: #fafafa;
        flex-shrink: 0;
      }

      body.dark .settings-tabs {
        background-color: #333;
        border-bottom-color: #444;
      }

      .tab-button {
        flex: 1;
        padding: 14px 20px;
        border: none;
        background: transparent;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 500;
        color: #666;
        border-bottom: 3px solid transparent;
        margin-bottom: -2px;
        transition: all 0.2s;
        position: relative;
      }

      .tab-button:hover {
        color: #0078D4;
        background-color: rgba(0, 120, 212, 0.05);
      }

      body.dark .tab-button:hover {
        background-color: rgba(0, 120, 212, 0.1);
      }

      .tab-button.active {
        color: #0078D4;
        border-bottom-color: #0078D4;
        background-color: #fff;
      }

      body.dark .tab-button.active {
        background-color: #2d2d2d;
      }

      .tab-button .tab-icon {
        margin-right: 8px;
        font-size: 1.1rem;
      }

      /* Tab 内容区域 */
      .settings-body {
        padding: 24px;
        overflow-y: auto;
        flex: 1;
        scrollbar-width: thin;
        scrollbar-color: #0078D4 #f1f1f1;
      }

      body.dark .settings-body {
        scrollbar-color: #0078D4 #3a3a3a;
      }

      body.dark .settings-body::-webkit-scrollbar-track {
        background: #3a3a3a;
      }

      body.dark .settings-body::-webkit-scrollbar-thumb {
        background: #0078D4;
      }

      .settings-body::-webkit-scrollbar {
        width: 8px;
      }

      .settings-body::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 4px;
      }

      .settings-body::-webkit-scrollbar-thumb {
        background: #0078D4;
        border-radius: 4px;
      }

      .settings-body::-webkit-scrollbar-thumb:hover {
        background: #005a9e;
      }

      /* Tab 面板 */
      .tab-pane {
        display: none;
        animation: tabFadeIn 0.2s ease-out;
      }

      .tab-pane.active {
        display: block;
      }

      @keyframes tabFadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .settings-section {
        margin-bottom: 24px;
        padding: 16px;
        background-color: #f8f9fa;
        border-radius: 8px;
      }

      body.dark .settings-section {
        background-color: #333;
      }

      .setting-item {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
        padding: 12px;
        background-color: #fff;
        border-radius: 6px;
        border: 1px solid #e9ecef;
        transition: all 0.2s;
      }

      .setting-item:last-child {
        margin-bottom: 0;
      }

      .setting-item:hover {
        transform: translateX(4px);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        border-color: #0078D4;
      }

      body.dark .setting-item {
        background-color: #404040;
        border-color: #555;
      }

      body.dark .setting-item:hover {
        border-color: #0078D4;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .setting-item label {
        flex: 1;
        font-weight: 500;
        color: #495057;
        min-width: 100px;
      }

      body.dark .setting-item label {
        color: #e9ecef;
      }

      .setting-item input[type="range"] {
        flex: 2;
        margin: 0 10px;
        height: 6px;
        -webkit-appearance: none;
        background: #e9ecef;
        border-radius: 3px;
        outline: none;
      }

      .setting-item input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #0078D4;
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0, 120, 212, 0.3);
        transition: all 0.2s;
      }

      .setting-item input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.15);
        box-shadow: 0 3px 8px rgba(0, 120, 212, 0.4);
      }

      .setting-item input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #0078D4;
        cursor: pointer;
        border: none;
        box-shadow: 0 2px 6px rgba(0, 120, 212, 0.3);
      }

      body.dark .setting-item input[type="range"] {
        background: #5a5a5a;
      }

      .setting-item span {
        width: 55px;
        text-align: right;
        font-weight: 600;
        color: #0078D4;
        background: linear-gradient(135deg, #0078D4, #005a9e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-size: 0.9rem;
      }

      .setting-item select,
      .setting-item input[type="text"] {
        flex: 2;
        padding: 8px 12px;
        border: 2px solid #e9ecef;
        border-radius: 6px;
        background-color: #fff;
        font-size: 0.9rem;
        transition: all 0.2s;
      }

      .setting-item select:focus,
      .setting-item input[type="text"]:focus {
        outline: none;
        border-color: #0078D4;
        box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.1);
      }

      body.dark .setting-item select,
      body.dark .setting-item input[type="text"] {
        background-color: #4a4a4a;
        border-color: #5a5a5a;
        color: #e9ecef;
      }

      body.dark .setting-item select:focus,
      body.dark .setting-item input[type="text"]:focus {
        border-color: #0078D4;
        box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.2);
      }

      .btn-secondary {
        background: linear-gradient(135deg, #0078D4, #005a9e);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        box-shadow: 0 2px 6px rgba(0, 120, 212, 0.3);
        transition: all 0.2s;
      }

      .btn-secondary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(0, 120, 212, 0.4);
      }

      .btn-secondary:active {
        transform: translateY(0);
      }

      .engine-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        margin: 8px 0;
        background-color: #f0f0f0;
        border-radius: 6px;
        transition: all 0.2s;
      }

      .engine-item:hover {
        transform: translateX(4px);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      body.dark .engine-item {
        background-color: #3a3a3a;
      }

      .engine-info {
        flex: 1;
        min-width: 0;
      }

      .engine-name {
        font-weight: bold;
        margin-bottom: 4px;
        color: #333;
      }

      body.dark .engine-name {
        color: #e9ecef;
      }

      .engine-url {
        font-size: 0.85em;
        color: #666;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      body.dark .engine-url {
        color: #aaa;
      }

      .engine-actions {
        display: flex;
        gap: 6px;
        margin-left: 10px;
      }

      .engine-btn {
        padding: 6px 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: all 0.2s;
      }

      .engine-btn:hover {
        transform: scale(1.05);
      }

      .edit-btn {
        background-color: #ffc107;
        color: #000;
      }

      .edit-btn:hover {
        background-color: #ffb300;
      }

      .delete-btn {
        background-color: #dc3545;
        color: white;
      }

      .delete-btn:hover {
        background-color: #c82333;
      }

      .engine-form {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 16px;
        background-color: #e9ecef;
        border-radius: 6px;
        margin: 10px 0;
        animation: formSlideIn 0.2s ease-out;
      }

      @keyframes formSlideIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      body.dark .engine-form {
        background-color: #444;
      }

      .engine-form input {
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 0.9rem;
      }

      .engine-form input:focus {
        outline: none;
        border-color: #0078D4;
        box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.1);
      }

      .engine-form-buttons {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      .save-btn {
        background-color: #28a745;
        color: white;
      }

      .save-btn:hover {
        background-color: #218838;
      }

      .cancel-btn {
        background-color: #6c757d;
        color: white;
      }

      .cancel-btn:hover {
        background-color: #5a6268;
      }

      .empty-state {
        text-align: center;
        padding: 30px;
        color: #999;
        font-size: 0.9rem;
      }

      body.dark .empty-state {
        color: #777;
      }
    </style>
  </head>

  <body>
    <header>
      <div style="display: flex; justify-content: end;">
        <span id="settingsBtn" style="display: block; padding: .5rem; cursor: pointer; font-size: 1.2rem;">⚙️</span>
      </div>
      <!-- 设置面板 -->
      <div id="settingsPanel" class="settings-panel" style="display: none;">
        <div class="settings-overlay"></div>
        <div class="settings-content">
          <div class="settings-header">
            <h3>设置</h3>
            <span id="closeSettings" class="close-btn">×</span>
          </div>

          <!-- Tab 导航 -->
          <div class="settings-tabs">
            <button class="tab-button active" data-tab="appearance">
              <span class="tab-icon">🎨</span>外观
            </button>
            <button class="tab-button" data-tab="style">
              <span class="tab-icon">📐</span>样式
            </button>
            <button class="tab-button" data-tab="behavior">
              <span class="tab-icon">⚡</span>行为
            </button>
            <button class="tab-button" data-tab="engines">
              <span class="tab-icon">🔍</span>引擎
            </button>
          </div>

          <!-- Tab 内容 -->
          <div class="settings-body">
            <!-- 外观设置 -->
            <div id="tab-appearance" class="tab-pane active">
              <div class="settings-section">
                <div class="setting-item">
                  <label for="themeSelect">主题模式</label>
                  <select id="themeSelect">
                    <option value="light">浅色模式</option>
                    <option value="dark">深色模式</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- 样式设置 -->
            <div id="tab-style" class="tab-pane">
              <div class="settings-section">
                <div class="setting-item">
                  <label for="widthSlider">搜索框宽度</label>
                  <input type="range" id="widthSlider" min="400" max="800" step="10">
                  <span id="widthValue">600px</span>
                </div>
                <div class="setting-item">
                  <label for="heightSlider">搜索框高度</label>
                  <input type="range" id="heightSlider" min="30" max="100" step="5">
                  <span id="heightValue">40px</span>
                </div>
                <div class="setting-item">
                  <label for="radiusSlider">圆角大小</label>
                  <input type="range" id="radiusSlider" min="0" max="30" step="1">
                  <span id="radiusValue">0px</span>
                </div>
                <div class="setting-item">
                  <label for="fontSizeSlider">字体大小</label>
                  <input type="range" id="fontSizeSlider" min="12" max="24" step="1">
                  <span id="fontSizeValue">16px</span>
                </div>
                <div class="setting-item">
                  <label for="topHeightSlider">顶部间距</label>
                  <input type="range" id="topHeightSlider" min="0" max="50" step="10">
                  <span id="topHeightValue">0px</span>
                </div>
              </div>
            </div>

            <!-- 行为设置 -->
            <div id="tab-behavior" class="tab-pane">
              <div class="settings-section">
                <div class="setting-item">
                  <label for="searchTargetSelect">搜索结果打开方式</label>
                  <select id="searchTargetSelect">
                    <option value="_self">当前标签页打开</option>
                    <option value="_blank">新标签页打开</option>
                  </select>
                </div>
                <div class="setting-item">
                  <label for="multiEngineSelect">多引擎切换工具条</label>
                  <select id="multiEngineSelect">
                    <option value="off">关闭</option>
                    <option value="on">开启 (在搜索结果页显示)</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- 引擎管理 -->
            <div id="tab-engines" class="tab-pane">
              <div class="settings-section">
                <div class="setting-item">
                  <button id="addEngineBtn" class="btn-secondary">+ 添加搜索引擎</button>
                </div>
                <div id="engineList">
                  <!-- 搜索引擎列表将在这里动态生成 -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
    <main>
      <!-- 当前搜索引擎 -->
      <div class="search-engine">
        <div id="currentSearchEngine" class="search-engine-name" style="cursor: pointer;"></div>
        <div class="search-engine-list">
        </div>
      </div>
      <div style="flex: 1; min-width: 0; margin: 0 0.5rem;">
        <input type="text" class="search-box" placeholder="请输入搜索内容...">
      </div>
      <div class="button">
        <button class="search-button">搜索</button>
      </div>
    </main>

    <script src="script.js"></script>
  </body>

</html>
